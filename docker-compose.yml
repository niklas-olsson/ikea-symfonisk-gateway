version: "3.8"

services:
  bridge:
    build: .
    ports:
      - "8732:8732"
      - "8080:8080"
    environment:
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=8732
      - BRIDGE_API_PORT=8732
      - BRIDGE_STREAM_PORT=8080
      - LOG_LEVEL=INFO
    volumes:
      - ./config:/app/config
    restart: unless-stopped
