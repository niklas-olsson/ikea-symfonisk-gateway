services:
  bridge:
    build: .
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      - BRIDGE_HOST=0.0.0.0
      - BRIDGE_PORT=8732
      - BRIDGE_API_PORT=8732
      - BRIDGE_STREAM_PORT=8080
      - LOG_LEVEL=INFO
      - XDG_RUNTIME_DIR=${XDG_RUNTIME_DIR:-/run/user/1000}
      - PULSE_SERVER=unix:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse/native
    volumes:
      - ./config:/app/config
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pipewire-0:${XDG_RUNTIME_DIR:-/run/user/1000}/pipewire-0
      - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:${XDG_RUNTIME_DIR:-/run/user/1000}/pulse
      - /var/lib/bluetooth:/var/lib/bluetooth
    restart: unless-stopped
