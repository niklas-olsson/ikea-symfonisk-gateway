<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IKEA SYMFONISK Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Impeccable Design System: OKLCH Colors */
            --bg: oklch(12% 0.01 240);
            --surface: oklch(18% 0.01 240);
            --surface-hover: oklch(22% 0.02 240);
            --text: oklch(92% 0.01 240);
            --text-muted: oklch(65% 0.01 240);
            --accent: oklch(65% 0.18 240);
            --accent-hover: oklch(70% 0.18 240);
            --error: oklch(60% 0.15 20);
            --success: oklch(65% 0.15 150);
            --warning: oklch(70% 0.15 80);
            --bt-accent: oklch(60% 0.16 260);
            --bt-accent-hover: oklch(65% 0.16 260);

            /* 4pt Grid System */
            --radius: 12px;
            --spacing-4: 4px;
            --spacing-8: 8px;
            --spacing-12: 12px;
            --spacing-16: 16px;
            --spacing-24: 24px;
            --spacing-32: 32px;
            --spacing-48: 48px;
            --spacing-64: 64px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Instrument Sans', sans-serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            padding: var(--spacing-64) var(--spacing-24);
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-32);
        }

        header {
            margin-bottom: var(--spacing-16);
        }

        h1 {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 600;
            letter-spacing: -0.04em;
            line-height: 1.1;
            margin-bottom: var(--spacing-8);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 400;
        }

        .card {
            background-color: var(--surface);
            padding: var(--spacing-32);
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            gap: var(--spacing-24);
            border: 1px solid oklch(100% 0 0 / 5%);
        }

        .selection-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-24);
        }

        @media (max-width: 600px) {
            .selection-row {
                grid-template-columns: 1fr;
            }
        }

        .actions-row {
            display: flex;
            gap: var(--spacing-16);
        }

        .status-row {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-12);
            padding: var(--spacing-16) var(--spacing-24);
            background-color: var(--bg);
            border-radius: var(--radius);
            border: 1px solid oklch(100% 0 0 / 5%);
        }

        .status-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .session-subtext {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .advanced-controls-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-24);
        }

        @media (max-width: 600px) {
            .advanced-controls-grid {
                grid-template-columns: 1fr;
            }
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-8);
        }

        .field-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .field-actions {
            display: flex;
            gap: var(--spacing-8);
        }

        label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        select, button {
            font-family: inherit;
            font-size: 1rem;
            padding: var(--spacing-12) var(--spacing-16);
            border-radius: var(--radius);
            border: 1px solid oklch(100% 0 0 / 10%);
            background-color: var(--bg);
            color: var(--text);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Focus rings for accessibility */
        select:focus-visible, button:focus-visible {
            outline: none;
            box-shadow: 0 0 0 4px oklch(from var(--accent) l c h / 30%);
            border-color: var(--accent);
        }

        select:hover {
            background-color: var(--surface-hover);
            border-color: oklch(100% 0 0 / 20%);
        }

        select:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px oklch(from var(--accent) l c h / 20%);
        }

        .actions {
            display: flex;
            gap: var(--spacing-16);
            margin-top: var(--spacing-8);
        }

        button {
            flex: 1;
            font-weight: 600;
            background-color: var(--accent);
            color: var(--bg);
            border: none;
        }

        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        button.secondary {
            background-color: transparent;
            color: var(--text);
            border: 1px solid oklch(100% 0 0 / 20%);
        }

        button.secondary:hover {
            background-color: var(--surface-hover);
            border-color: var(--text-muted);
        }

        button.small-text {
            flex: none;
            padding: 2px 8px;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.02em;
            background: transparent;
            color: var(--accent);
            border: 1px solid oklch(from var(--accent) l c h / 30%);
            border-radius: 6px;
        }

        button.small-text:hover {
            background: oklch(from var(--accent) l c h / 10%);
            transform: none;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
            padding: var(--spacing-16) var(--spacing-24);
            background-color: var(--bg);
            border-radius: var(--radius);
            margin-top: var(--spacing-8);
        }

        .status-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .status-idle { background-color: oklch(40% 0 0 / 20%); color: var(--text-muted); border: 1px solid oklch(40% 0 0 / 30%); }
        .status-active { background-color: oklch(from var(--success) l c h / 20%); color: var(--success); border: 1px solid oklch(from var(--success) l c h / 30%); }
        .status-error { background-color: oklch(from var(--error) l c h / 20%); color: var(--error); border: 1px solid oklch(from var(--error) l c h / 30%); }

        .log-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-16);
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            font-weight: 600;
        }

        details > summary {
            transition: color 0.2s ease;
            cursor: pointer;
        }

        details > summary:hover {
            color: var(--text);
        }

        .events-log {
            font-family: 'ui-monospace', 'Cascadia Code', 'Source Code Pro', monospace;
            font-size: 0.8rem;
            background-color: var(--surface);
            padding: var(--spacing-24);
            border-radius: var(--radius);
            height: 240px;
            overflow-y: auto;
            display: flex;
            flex-direction: column-reverse;
            gap: var(--spacing-12);
            border: 1px solid oklch(100% 0 0 / 5%);
        }

        .event-item {
            display: flex;
            gap: var(--spacing-16);
            align-items: flex-start;
            padding-bottom: var(--spacing-8);
            border-bottom: 1px solid oklch(100% 0 0 / 5%);
        }

        .event-item:last-child {
            border-bottom: none;
        }

        .event-time { color: var(--text-muted); opacity: 0.5; font-variant-numeric: tabular-nums; flex-shrink: 0; }
        .event-type { font-weight: 600; color: var(--accent); min-width: 140px; flex-shrink: 0; }
        .event-message { color: var(--text); word-break: break-all; }

        /* ── Bluetooth Panel ─────────────────────────────── */

        .bt-card {
            border: 1px solid oklch(from var(--bt-accent) l c h / 15%);
        }

        .bt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bt-title {
            display: flex;
            align-items: center;
            gap: var(--spacing-12);
        }

        .bt-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: oklch(from var(--bt-accent) l c h / 15%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .bt-title h2 {
            font-size: 0.85rem;
            color: var(--text);
            text-transform: none;
            letter-spacing: 0;
        }

        .bt-status-indicators {
            display: flex;
            gap: var(--spacing-8);
        }

        .bt-indicator {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .bt-indicator.on {
            background: oklch(from var(--success) l c h / 15%);
            color: var(--success);
            border: 1px solid oklch(from var(--success) l c h / 25%);
        }

        .bt-indicator.off {
            background: oklch(40% 0 0 / 15%);
            color: var(--text-muted);
            border: 1px solid oklch(40% 0 0 / 25%);
        }

        .bt-indicator.warning {
            background: oklch(from var(--warning) l c h / 15%);
            color: var(--warning);
            border: 1px solid oklch(from var(--warning) l c h / 25%);
        }

        .bt-indicator.error {
            background: oklch(from var(--error) l c h / 15%);
            color: var(--error);
            border: 1px solid oklch(from var(--error) l c h / 25%);
        }

        .bt-pairing-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-16);
        }

        .bt-pairing-controls {
            display: flex;
            gap: var(--spacing-12);
            align-items: center;
        }

        .bt-pairing-controls button {
            flex: none;
            padding: var(--spacing-8) var(--spacing-16);
            font-size: 0.85rem;
        }

        button.bt-primary {
            background-color: var(--bt-accent);
            color: white;
        }

        button.bt-primary:hover {
            background-color: var(--bt-accent-hover);
        }

        button.bt-danger {
            background-color: transparent;
            color: var(--error);
            border: 1px solid oklch(from var(--error) l c h / 30%);
        }

        button.bt-danger:hover {
            background: oklch(from var(--error) l c h / 10%);
        }

        .bt-countdown {
            display: flex;
            align-items: center;
            gap: var(--spacing-8);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .bt-countdown-bar {
            flex: 1;
            height: 4px;
            background: oklch(40% 0 0 / 20%);
            border-radius: 2px;
            overflow: hidden;
        }

        .bt-countdown-fill {
            height: 100%;
            background: var(--bt-accent);
            border-radius: 2px;
            transition: width 1s linear;
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 0 oklch(from var(--bt-accent) l c h / 30%); }
            50% { box-shadow: 0 0 0 8px oklch(from var(--bt-accent) l c h / 0%); }
        }

        .bt-pairing-active {
            animation: pulse-glow 2s ease-in-out infinite;
            border-color: oklch(from var(--bt-accent) l c h / 40%) !important;
        }

        .bt-devices-section {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-12);
        }

        .bt-devices-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .bt-device-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-8);
        }

        .bt-device-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-12) var(--spacing-16);
            background: var(--bg);
            border-radius: var(--radius);
            border: 1px solid oklch(100% 0 0 / 5%);
            transition: border-color 0.2s;
        }

        .bt-device-item:hover {
            border-color: oklch(100% 0 0 / 12%);
        }

        .bt-device-item.connected {
            background: oklch(from var(--success) l c h / 5%);
            border-color: oklch(from var(--success) l c h / 40%);
        }

        .bt-device-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .bt-device-name {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bt-device-mac {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: 'ui-monospace', 'Cascadia Code', 'Source Code Pro', monospace;
        }

        .bt-device-badges {
            display: flex;
            gap: var(--spacing-4);
            margin-top: 2px;
        }

        .bt-badge {
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .bt-badge.paired { background: oklch(from var(--bt-accent) l c h / 15%); color: var(--bt-accent); }
        .bt-badge.connected { background: oklch(from var(--success) l c h / 15%); color: var(--success); }
        .bt-badge.trusted { background: oklch(from var(--warning) l c h / 15%); color: var(--warning); }
        .bt-badge.preferred { background: oklch(from var(--accent) l c h / 15%); color: var(--accent); }

        .bt-device-actions {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-8);
            align-items: flex-end;
            flex-shrink: 0;
        }

        .bt-device-actions-primary {
            display: flex;
            gap: var(--spacing-8);
        }

        .bt-device-actions-secondary {
            display: flex;
            gap: var(--spacing-4);
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .bt-device-actions-secondary:hover {
            opacity: 1;
        }

        .bt-device-actions button {
            flex: none;
            padding: 4px 10px;
            font-size: 0.65rem;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .bt-empty {
            padding: var(--spacing-24);
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .bt-errors {
            padding: var(--spacing-12) var(--spacing-16);
            background: oklch(from var(--error) l c h / 8%);
            border: 1px solid oklch(from var(--error) l c h / 20%);
            border-radius: var(--radius);
            font-size: 0.8rem;
            color: var(--error);
        }

        .bt-errors ul {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: var(--spacing-4);
        }

        .bt-errors li::before {
            content: "⚠ ";
        }
    </style>
</head>
<body>
    <main>
        <header style="display: flex; justify-content: space-between; align-items: flex-start;">
            <div>
                <h1>Bridge</h1>
                <p class="subtitle">IKEA SYMFONISK Gateway v0.1.0</p>
            </div>
            <div id="bridge-health" class="status-tag status-idle" style="margin-top: var(--spacing-12);">
                Checking Health...
            </div>
        </header>

        <!-- ── Playback Controls ───────────────────────────── -->
        <section class="card">
            <div class="selection-row">
                <div class="field">
                    <label for="source-select">Audio Source</label>
                    <select id="source-select">
                        <option value="">Loading sources...</option>
                    </select>
                </div>
                <div class="field">
                    <label for="target-select">Playback Target</label>
                    <select id="target-select">
                        <option value="">Loading targets...</option>
                    </select>
                </div>
            </div>

            <div class="actions-row">
                <button id="play-btn">Play</button>
                <button id="stop-btn" class="secondary" disabled>Stop</button>
            </div>

            <div class="status-row">
                <div class="status-main">
                    <div style="display: flex; align-items: center; gap: var(--spacing-16);">
                        <label>Session</label>
                        <span id="session-state" class="status-tag status-idle">Idle</span>
                    </div>
                    <button id="recover-btn" class="small-text" style="display: none;" onclick="recoverSession()">Recover</button>
                </div>
                <div id="session-subtext" class="session-subtext">Select a source and speaker to begin</div>
            </div>

            <div id="session-error-container" style="display: none; padding: var(--spacing-16) var(--spacing-24); background-color: oklch(from var(--error) l c h / 10%); border-radius: var(--radius); border: 1px solid oklch(from var(--error) l c h / 20%);">
                <div style="display: flex; flex-direction: column; gap: var(--spacing-4);">
                    <label style="color: var(--error);">Recommendation</label>
                    <p id="session-error-action" style="font-size: 0.9rem; color: var(--text);"></p>
                </div>
            </div>

            <!-- Advanced Control -->
            <details style="margin-top: var(--spacing-8);">
                <summary style="font-size: 0.75rem; color: var(--text-muted); cursor: pointer; user-select: none; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: var(--spacing-4) 0;">
                    Advanced Control
                </summary>
                <div style="padding-top: var(--spacing-16); display: flex; flex-direction: column; gap: var(--spacing-24);">
                    <div class="advanced-controls-grid">
                        <div class="field">
                            <label>Source Management</label>
                            <div class="field-actions" style="margin-top: var(--spacing-4);">
                                <button id="set-preferred-source" class="small-text">★ Set Preferred</button>
                                <button id="refresh-sources" class="small-text">Refresh</button>
                            </div>
                        </div>
                        <div class="field">
                            <label>Speaker Management</label>
                            <div class="field-actions" style="margin-top: var(--spacing-4);">
                                <button id="set-preferred-target" class="small-text">★ Set Preferred</button>
                                <button id="refresh-targets" class="small-text">Refresh</button>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="delivery-profile-select">Delivery Profile</label>
                        <select id="delivery-profile-select" style="margin-top: var(--spacing-8);">
                            <option value="stable">Stable</option>
                            <option value="experimental">Experimental</option>
                        </select>
                        <label id="delivery-profile-note" for="delivery-profile-select" style="text-transform: none; letter-spacing: 0; font-size: 0.8rem; display: none; color: var(--text-muted); margin-top: var(--spacing-4);">
                            Experimental: Lower latency, reduced buffering. May fall back to Stable if connection is unstable.
                        </label>
                    </div>
                </div>
            </details>
        </section>

        <!-- ── Bluetooth Panel ─────────────────────────────── -->
        <section id="bt-panel" class="card bt-card">
            <div class="bt-header">
                <div class="bt-title">
                    <div class="bt-icon">᛭</div>
                    <h2>Bluetooth</h2>
                </div>
                <div class="bt-status-indicators" id="bt-indicators">
                    <span class="bt-indicator off" id="bt-power-ind">Off</span>
                </div>
            </div>

            <!-- Hardware Diagnostics -->
            <details id="bt-diagnostics" style="display: none;">
                <summary style="font-size: 0.75rem; color: var(--error); cursor: pointer; user-select: none; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; padding: var(--spacing-4) 0;">
                    Hardware Diagnostics
                </summary>
                <div id="bt-errors" class="bt-errors" style="margin-top: var(--spacing-12);">
                    <ul id="bt-error-list"></ul>
                </div>
            </details>

            <div id="bt-main-controls">
                <!-- Pairing Controls -->
                <div class="bt-pairing-section">
                    <div class="bt-pairing-controls">
                        <button id="bt-pair-btn" class="bt-primary" onclick="btOpenPairing()">Enter Pairing Mode</button>
                        <button id="bt-pair-stop-btn" class="bt-danger" onclick="btClosePairing()" style="display: none;">Stop Pairing</button>
                        <div id="bt-countdown" class="bt-countdown" style="display: none;">
                            <div class="bt-countdown-bar">
                                <div id="bt-countdown-fill" class="bt-countdown-fill" style="width: 100%;"></div>
                            </div>
                            <span id="bt-countdown-text">90s</span>
                        </div>
                    </div>
                </div>

                <!-- Device List -->
                <div class="bt-devices-section">
                    <div class="bt-devices-header">
                        <label>Devices</label>
                        <button class="small-text" onclick="btRefreshDevices()">Refresh</button>
                    </div>
                    <div id="bt-device-list" class="bt-device-list">
                        <div class="bt-empty">No devices discovered</div>
                    </div>
                </div>
            </div>

            <!-- Unavailable Message -->
            <div id="bt-unavailable-msg" style="display: none; padding: var(--spacing-24); text-align: center; color: var(--text-muted); font-size: 0.9rem; background: oklch(100% 0 0 / 2%); border-radius: var(--radius);">
                Bluetooth is currently disabled or unsupported on this hardware.
            </div>
        </section>

        <!-- ── Event Log (Advanced) ────────────────────────── -->
        <details class="log-section">
            <summary style="font-size: 0.75rem; color: var(--text-muted); cursor: pointer; user-select: none; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: var(--spacing-8);">
                Developer Logs
            </summary>
            <div id="events-log" class="events-log"></div>
        </details>
    </main>

    <script>
        // ── Session UI refs ────────────────────────────────
        const sourceSelect = document.getElementById('source-select');
        const targetSelect = document.getElementById('target-select');
        const deliveryProfileSelect = document.getElementById('delivery-profile-select');
        const deliveryProfileNote = document.getElementById('delivery-profile-note');
        const playBtn = document.getElementById('play-btn');
        const stopBtn = document.getElementById('stop-btn');
        const sessionState = document.getElementById('session-state');
        const eventsLog = document.getElementById('events-log');
        const refreshSourcesBtn = document.getElementById('refresh-sources');
        const refreshTargetsBtn = document.getElementById('refresh-targets');
        let currentSessionId = null;
        let deliveryProfileConfig = {
            globalProfile: 'stable',
            sourceOverrides: {}
        };

        // ── Bluetooth state ────────────────────────────────
        let btPairingTimer = null;
        let btPairingTotalSeconds = 90;
        let btPairingRemainingSeconds = 0;
        let btPreferredMac = null;

        function normalizeDeliveryProfile(value) {
            return value === 'experimental' ? 'experimental' : 'stable';
        }

        function parseConfiguredDeliveryProfile(value) {
            if (value === 'stable' || value === 'experimental') {
                return value;
            }
            return null;
        }

        function normalizeDeliveryProfileOverrides(value) {
            if (!value || typeof value !== 'object' || Array.isArray(value)) {
                return {};
            }

            return Object.fromEntries(
                Object.entries(value)
                    .map(([sourceId, profile]) => [sourceId, typeof profile === 'string' ? parseConfiguredDeliveryProfile(profile) : null])
                    .filter(([sourceId, profile]) => typeof sourceId === 'string' && profile !== null)
            );
        }

        function getSelectedSourceId() {
            return sourceSelect.value || null;
        }

        function getEffectiveDeliveryProfileForSource(sourceId) {
            if (sourceId && Object.prototype.hasOwnProperty.call(deliveryProfileConfig.sourceOverrides, sourceId)) {
                return deliveryProfileConfig.sourceOverrides[sourceId];
            }
            return deliveryProfileConfig.globalProfile;
        }

        function syncDeliveryProfileSelection() {
            deliveryProfileSelect.value = getEffectiveDeliveryProfileForSource(getSelectedSourceId());
            updateDeliveryProfileUI();
        }

        function updateDeliveryProfileUI() {
            deliveryProfileNote.style.display = deliveryProfileSelect.value === 'experimental' ? 'block' : 'none';
        }

        async function loadDeliveryProfile() {
            try {
                const [globalRes, overridesRes] = await Promise.all([
                    fetch('/v1/config/audio_delivery_profile'),
                    fetch('/v1/config/audio_delivery_profile_overrides')
                ]);

                if (globalRes.ok) {
                    const { value } = await globalRes.json();
                    deliveryProfileConfig.globalProfile = parseConfiguredDeliveryProfile(value) || 'stable';
                } else {
                    deliveryProfileConfig.globalProfile = 'stable';
                }

                if (overridesRes.ok) {
                    const { value } = await overridesRes.json();
                    deliveryProfileConfig.sourceOverrides = normalizeDeliveryProfileOverrides(value);
                } else {
                    deliveryProfileConfig.sourceOverrides = {};
                }
            } catch (err) {
                deliveryProfileConfig = {
                    globalProfile: 'stable',
                    sourceOverrides: {}
                };
            }
            syncDeliveryProfileSelection();
        }

        async function persistDeliveryProfile() {
            const sourceId = getSelectedSourceId();
            const value = normalizeDeliveryProfile(deliveryProfileSelect.value);
            const hasSourceOverride = sourceId && Object.prototype.hasOwnProperty.call(deliveryProfileConfig.sourceOverrides, sourceId);

            if (sourceId && hasSourceOverride) {
                const nextOverrides = { ...deliveryProfileConfig.sourceOverrides };
                if (value === deliveryProfileConfig.globalProfile) {
                    delete nextOverrides[sourceId];
                } else {
                    nextOverrides[sourceId] = value;
                }
                await fetch('/v1/config/audio_delivery_profile_overrides', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: nextOverrides })
                });
                deliveryProfileConfig.sourceOverrides = nextOverrides;
            } else {
                await fetch('/v1/config/audio_delivery_profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value })
                });
                deliveryProfileConfig.globalProfile = value;
            }

            syncDeliveryProfileSelection();
        }

        // ── Session functions ──────────────────────────────

        async function fetchSources(isRefreshing = false) {
            if (isRefreshing) {
                sourceSelect.innerHTML = '<option value="">Discovering sources...</option>';
            }
            try {
                const res = await fetch('/v1/sources');
                const { sources } = await res.json();
                const currentValue = sourceSelect.value;

                if (sources.length === 0) {
                    sourceSelect.innerHTML = '<option value="">No sources found. Connect a device or click Refresh.</option>';
                } else {
                    sourceSelect.innerHTML = sources.map(s => {
                        let label = s.display_name;
                        if (s.is_active) label = '● ' + label;
                        if (s.is_preferred) label = '★ ' + label;
                        if (!s.is_available) label = '[OFFLINE] ' + label;

                        // Map internal source types to user-friendly labels
                        const typeLabels = {
                            'system_audio': 'System Audio',
                            'bluetooth_audio': 'Bluetooth',
                            'microphone': 'Microphone',
                            'line_in': 'Line In',
                            'file_replay': 'File',
                            'synthetic_test_source': 'Test Source'
                        };
                        const typeLabel = typeLabels[s.source_type] || s.source_type;

                        return `<option value="${s.source_id}">${label}</option>`;
                    }).join('');
                }

                if (currentValue && sources.find(s => s.source_id === currentValue)) {
                    sourceSelect.value = currentValue;
                } else if (!currentValue || !sources.find(s => s.source_id === currentValue)) {
                    const preferred = sources.find(s => s.is_preferred && s.is_available);
                    if (preferred) {
                        sourceSelect.value = preferred.source_id;
                    } else if (sources.length > 0) {
                        // Select first available source if no preferred
                        const firstAvailable = sources.find(s => s.is_available);
                        if (firstAvailable) sourceSelect.value = firstAvailable.source_id;
                    }
                }

                syncDeliveryProfileSelection();
                updateSessionUI(sessionState.textContent.toUpperCase() === 'IDLE' ? 'IDLE' : (sessionState.textContent.toUpperCase() === 'FAILED' ? 'ERROR' : 'ACTIVE'), sessionState.textContent);
            } catch (err) {
                console.error('Failed to fetch sources', err);
                addLog('ERROR', 'Failed to fetch sources');
                sourceSelect.innerHTML = '<option value="">Failed to load sources</option>';
            }
        }

        async function fetchTargets(isRefreshing = false) {
            if (isRefreshing) {
                targetSelect.innerHTML = '<option value="">Discovering speakers...</option>';
            }
            try {
                const res = await fetch('/v1/targets');
                const { targets } = await res.json();
                const currentValue = targetSelect.value;

                if (targets.length === 0) {
                    targetSelect.innerHTML = '<option value="">No speakers found. Check power and click Refresh.</option>';
                } else {
                    targetSelect.innerHTML = targets.map(t => {
                        let label = t.display_name;
                        if (t.is_active) label = '● ' + label;
                        if (t.is_preferred) label = '★ ' + label;
                        if (!t.is_available) label = '[OFFLINE] ' + label;
                        return `<option value="${t.target_id}">${label}</option>`;
                    }).join('');
                }

                if (currentValue && targets.find(t => t.target_id === currentValue)) {
                    targetSelect.value = currentValue;
                } else if (!currentValue || !targets.find(t => t.target_id === currentValue)) {
                    const preferred = targets.find(t => t.is_preferred && t.is_available);
                    if (preferred) {
                        targetSelect.value = preferred.target_id;
                    } else if (targets.length > 0) {
                        const firstAvailable = targets.find(t => t.is_available);
                        if (firstAvailable) targetSelect.value = firstAvailable.target_id;
                    }
                }
                updateSessionUI(sessionState.textContent.toUpperCase() === 'IDLE' ? 'IDLE' : (sessionState.textContent.toUpperCase() === 'FAILED' ? 'ERROR' : 'ACTIVE'), sessionState.textContent);
            } catch (err) {
                console.error('Failed to fetch targets', err);
                addLog('ERROR', 'Failed to fetch targets');
                targetSelect.innerHTML = '<option value="">Failed to load targets</option>';
            }
        }

        async function refreshSources() {
            addLog('SYSTEM', 'Refreshing sources...');
            fetchSources(true);
            try {
                await fetch('/v1/sources/refresh', { method: 'POST' });
                await fetchSources();
            } catch (err) {
                console.error('Refresh sources failed', err);
                addLog('ERROR', 'Refresh sources failed');
            }
        }

        async function refreshTargets() {
            addLog('SYSTEM', 'Refreshing targets...');
            fetchTargets(true);
            try {
                await fetch('/v1/targets/refresh', { method: 'POST' });
                await fetchTargets();
            } catch (err) {
                console.error('Refresh targets failed', err);
                addLog('ERROR', 'Refresh targets failed');
            }
        }

        async function setPreferredSource() {
            const sourceId = sourceSelect.value;
            if (!sourceId) return;
            addLog('SYSTEM', 'Saving preferred source...');
            try {
                await fetch('/v1/config/preferred_source_id', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: sourceId })
                });
                await fetchSources();
            } catch (err) {
                addLog('ERROR', 'Failed to save preferred source');
            }
        }

        async function setPreferredTarget() {
            const targetId = targetSelect.value;
            if (!targetId) return;
            addLog('SYSTEM', 'Saving preferred target...');
            try {
                await fetch('/v1/config/preferred_target_id', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: targetId })
                });
                await fetchTargets();
            } catch (err) {
                addLog('ERROR', 'Failed to save preferred target');
            }
        }

        async function createAndStartSession() {
            const source_id = sourceSelect.value;
            const target_id = targetSelect.value;

            if (!source_id || !target_id) {
                addLog('SYSTEM', 'Select a source and target first');
                return;
            }

            playBtn.disabled = true;
            addLog('SYSTEM', 'Creating session...');

            try {
                await persistDeliveryProfile();
                const createRes = await fetch('/v1/sessions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ source_id, target_id })
                });

                if (!createRes.ok) {
                    const err = await createRes.json();
                    throw new Error(err.detail?.message || 'Failed to create session');
                }

                const { session_id } = await createRes.json();
                currentSessionId = session_id;

                addLog('SYSTEM', `Starting session ${session_id}...`);
                const startRes = await fetch(`/v1/sessions/${session_id}/start`, { method: 'POST' });

                if (!startRes.ok) {
                    const err = await startRes.json();
                    throw new Error(err.detail?.message || 'Failed to start session');
                }

                stopBtn.disabled = false;
                updateSessionUI('ACTIVE', 'Starting');
            } catch (err) {
                console.error('Session failed', err);
                addLog('ERROR', err.message);
                playBtn.disabled = false;

                // Try to extract action if available from previous fetch failure
                let action = 'Failed to start session. Check your connections and try again.';
                updateSessionUI('ERROR', 'Failed', action);
            }
        }

        async function stopCurrentSession() {
            if (!currentSessionId) {
                addLog('SYSTEM', 'Looking for sessions to stop...');
                try {
                    const res = await fetch('/v1/sessions');
                    const { sessions } = await res.json();
                    const active = sessions.find(s => ['playing', 'starting', 'preparing'].includes(s.state));
                    if (active) {
                        currentSessionId = active.session_id;
                    } else {
                        addLog('SYSTEM', 'No active sessions found');
                        return;
                    }
                } catch (e) {
                    return;
                }
            }

            stopBtn.disabled = true;
            addLog('SYSTEM', `Stopping session ${currentSessionId}...`);

            try {
                await fetch(`/v1/sessions/${currentSessionId}/stop`, { method: 'POST' });
                updateSessionUI('IDLE', 'Stopping');
            } catch (err) {
                console.error('Stop failed', err);
                addLog('ERROR', 'Failed to stop session');
                stopBtn.disabled = false;
            }
        }

        async function recoverSession() {
            if (!currentSessionId) return;
            const recoverBtn = document.getElementById('recover-btn');
            recoverBtn.disabled = true;
            addLog('SYSTEM', `Attempting recovery for session ${currentSessionId}...`);
            try {
                const res = await fetch(`/v1/sessions/${currentSessionId}/recover`, { method: 'POST' });
                if (res.ok) {
                    addLog('SYSTEM', 'Recovery command sent');
                } else {
                    const err = await res.json();
                    addLog('ERROR', `Recovery failed: ${err.detail?.message || 'Unknown error'}`);
                }
            } catch (err) {
                addLog('ERROR', `Recovery failed: ${err.message}`);
            } finally {
                recoverBtn.disabled = false;
            }
        }

        function getSelectedText(selectEl) {
            if (!selectEl || selectEl.selectedIndex === -1) return null;
            const text = selectEl.options[selectEl.selectedIndex].text;
            // Clean up common prefixes used in labels
            return text.replace(/^●\s*/, '').replace(/^★\s*/, '').replace(/^\[OFFLINE\]\s*/, '').split(' (')[0];
        }

        function updateSessionUI(state, label, errorAction = null) {
            sessionState.textContent = label;
            sessionState.className = `status-tag status-${state.toLowerCase()}`;

            const errorContainer = document.getElementById('session-error-container');
            const errorText = document.getElementById('session-error-action');
            const recoverBtn = document.getElementById('recover-btn');
            const subtextEl = document.getElementById('session-subtext');

            if (state === 'ERROR' && errorAction) {
                errorContainer.style.display = 'block';
                errorText.textContent = errorAction;
                recoverBtn.style.display = 'block';
            } else if (state !== 'ERROR') {
                errorContainer.style.display = 'none';
                recoverBtn.style.display = 'none';
            }

            // Update subtext
            const sourceName = getSelectedText(sourceSelect);
            const targetName = getSelectedText(targetSelect);

            if (!sourceName || !targetName) {
                subtextEl.textContent = 'Select source and target';
            } else if (state === 'ACTIVE') {
                subtextEl.textContent = `Playing: ${sourceName} → ${targetName}`;
            } else if (state === 'ERROR') {
                subtextEl.textContent = `Failed: ${sourceName} → ${targetName}`;
            } else {
                subtextEl.textContent = `Ready: ${sourceName} → ${targetName}`;
            }
        }

        function addLog(type, data) {
            const item = document.createElement('div');
            item.className = 'event-item';
            const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });

            let message = '';
            if (typeof data === 'string') {
                message = data;
            } else if (data.payload) {
                message = typeof data.payload === 'string' ? data.payload : JSON.stringify(data.payload);
            } else {
                message = JSON.stringify(data);
            }

            item.innerHTML = `
                <span class="event-time">${time}</span>
                <span class="event-type">${type}</span>
                <span class="event-message">${message}</span>
            `;

            eventsLog.prepend(item);

            while (eventsLog.children.length > 50) {
                eventsLog.removeChild(eventsLog.lastChild);
            }
        }

        // ── Bluetooth functions ────────────────────────────

        async function btFetchStatus() {
            try {
                const res = await fetch('/v1/bluetooth/status');
                if (!res.ok) {
                    btShowError('Bluetooth adapter unavailable');
                    return;
                }
                const status = await res.json();
                btUpdateStatusUI(status);
            } catch (err) {
                btShowError('Cannot reach Bluetooth API');
            }
        }

        function btUpdateStatusUI(status) {
            const indicators = document.getElementById('bt-indicators');
            const diagnostics = document.getElementById('bt-diagnostics');
            const errorList = document.getElementById('bt-error-list');
            const panel = document.getElementById('bt-panel');
            const pairBtn = document.getElementById('bt-pair-btn');
            const mainControls = document.getElementById('bt-main-controls');
            const unavailableMsg = document.getElementById('bt-unavailable-msg');

            // Indicators
            const props = status.properties || {};
            const powered = props.Powered || false;
            const discoverable = props.Discoverable || false;
            const pairable = props.Pairable || false;
            const pairingOpen = status.pairing_window?.is_open || false;

            let indicatorsHTML = '';
            indicatorsHTML += `<span class="bt-indicator ${powered ? 'on' : 'off'}">${powered ? 'Powered' : 'Off'}</span>`;
            if (discoverable) indicatorsHTML += `<span class="bt-indicator on">Discoverable</span>`;
            if (pairingOpen) indicatorsHTML += `<span class="bt-indicator warning">Pairing</span>`;
            indicators.innerHTML = indicatorsHTML;

            // Errors & Availability
            const errors = status.readiness_errors || [];
            const isUnsupported = !status.healthy && errors.some(e => e.includes('MISSING') || e.includes('UNSUPPORTED'));
            const isDisabled = status.healthy && !powered;

            if (errors.length > 0 && !status.healthy) {
                diagnostics.style.display = 'block';
                errorList.innerHTML = errors.map(e =>
                    `<li>${e.replace(/_/g, ' ')}</li>`
                ).join('');
            } else {
                diagnostics.style.display = 'none';
            }

            if (isUnsupported || isDisabled) {
                mainControls.style.display = 'none';
                unavailableMsg.style.display = 'block';
                unavailableMsg.textContent = isUnsupported
                    ? "Bluetooth is unsupported on this host."
                    : "Bluetooth is disabled. Please enable it in system settings.";
            } else {
                mainControls.style.display = 'block';
                unavailableMsg.style.display = 'none';
            }

            // Pairing UI state
            if (pairingOpen) {
                panel.classList.add('bt-pairing-active');
                pairBtn.style.display = 'none';
                document.getElementById('bt-pair-stop-btn').style.display = '';
                document.getElementById('bt-countdown').style.display = 'flex';
                // Add a searching indicator if not present
                if (!document.getElementById('bt-searching-label')) {
                    const label = document.createElement('span');
                    label.id = 'bt-searching-label';
                    label.style.fontSize = '0.75rem';
                    label.style.color = 'var(--bt-accent)';
                    label.style.fontWeight = '600';
                    label.textContent = 'Searching for devices...';
                    document.getElementById('bt-countdown').prepend(label);
                }
            } else {
                const searchingLabel = document.getElementById('bt-searching-label');
                if (searchingLabel) searchingLabel.remove();
                panel.classList.remove('bt-pairing-active');
                pairBtn.style.display = '';
                pairBtn.disabled = !powered;
                document.getElementById('bt-pair-stop-btn').style.display = 'none';
                if (!btPairingTimer) {
                    document.getElementById('bt-countdown').style.display = 'none';
                }
            }

            // Preferred device
            btPreferredMac = status.preferred_device || null;
        }

        function btShowError(msg) {
            const errorsDiv = document.getElementById('bt-errors');
            const errorList = document.getElementById('bt-error-list');
            errorsDiv.style.display = 'block';
            errorList.innerHTML = `<li>${msg}</li>`;
        }

        async function btOpenPairing() {
            const pairBtn = document.getElementById('bt-pair-btn');
            pairBtn.disabled = true;

            btPairingTotalSeconds = 90;
            btPairingRemainingSeconds = btPairingTotalSeconds;

            try {
                const res = await fetch('/v1/bluetooth/pairing/open', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ timeout_seconds: btPairingTotalSeconds })
                });

                if (!res.ok) {
                    const err = await res.json();
                    addLog('BT-ERROR', err.detail?.message || 'Failed to open pairing window');
                    pairBtn.disabled = false;
                    return;
                }

                addLog('BLUETOOTH', 'Pairing mode activated (90s)');
                btStartCountdown();
                await btFetchStatus();
                refreshSources();
            } catch (err) {
                addLog('BT-ERROR', 'Failed to open pairing: ' + err.message);
                pairBtn.disabled = false;
            }
        }

        async function btClosePairing() {
            try {
                await fetch('/v1/bluetooth/pairing/close', { method: 'POST' });
                addLog('BLUETOOTH', 'Pairing mode stopped');
                btStopCountdown();
                await btFetchStatus();
            } catch (err) {
                addLog('BT-ERROR', 'Failed to close pairing: ' + err.message);
            }
        }

        function btStartCountdown() {
            btStopCountdown();
            const fill = document.getElementById('bt-countdown-fill');
            const text = document.getElementById('bt-countdown-text');
            const countdown = document.getElementById('bt-countdown');
            countdown.style.display = 'flex';

            btPairingTimer = setInterval(() => {
                btPairingRemainingSeconds--;
                const pct = (btPairingRemainingSeconds / btPairingTotalSeconds) * 100;
                fill.style.width = pct + '%';
                text.textContent = btPairingRemainingSeconds + 's';

                if (btPairingRemainingSeconds <= 0) {
                    btStopCountdown();
                    btFetchStatus();
                    btRefreshDevices();
                }
            }, 1000);
        }

        function btStopCountdown() {
            if (btPairingTimer) {
                clearInterval(btPairingTimer);
                btPairingTimer = null;
            }
        }

        async function btRefreshDevices() {
            try {
                const [devRes, prefRes] = await Promise.all([
                    fetch('/v1/bluetooth/devices'),
                    fetch('/v1/bluetooth/devices/preferred')
                ]);
                const devices = await devRes.json();
                const pref = await prefRes.json();
                btPreferredMac = pref.mac || null;
                btRenderDevices(devices);
            } catch (err) {
                console.error('Failed to fetch BT devices', err);
            }
        }

        function btRenderDevices(devices) {
            const list = document.getElementById('bt-device-list');

            if (!devices || devices.length === 0) {
                list.innerHTML = '<div class="bt-empty">No devices found. Enter Pairing Mode to connect a device.</div>';
                return;
            }

            // Sort: connected first, then paired, then by name
            devices.sort((a, b) => {
                if (a.connected !== b.connected) return b.connected ? 1 : -1;
                if (a.paired !== b.paired) return b.paired ? 1 : -1;
                return (a.name || '').localeCompare(b.name || '');
            });

            list.innerHTML = devices.map(d => {
                const isPreferred = btPreferredMac && d.mac.toUpperCase() === btPreferredMac.toUpperCase();
                let badges = '';
                if (d.connected) badges += '<span class="bt-badge connected">Connected</span>';
                if (d.paired) badges += '<span class="bt-badge paired">Paired</span>';
                if (d.trusted) badges += '<span class="bt-badge trusted">Trusted</span>';
                if (isPreferred) badges += '<span class="bt-badge preferred">★ Preferred</span>';

                let primaryActions = '';
                let secondaryActions = '';

                if (d.connected) {
                    primaryActions += `<button class="bt-danger" onclick="btDisconnect('${d.mac}')">Disconnect</button>`;
                } else if (d.paired) {
                    primaryActions += `<button class="bt-primary" onclick="btConnect('${d.mac}')">Connect</button>`;
                }

                if (!d.trusted) {
                    secondaryActions += `<button class="secondary" onclick="btTrust('${d.mac}', '${(d.name || '').replace(/'/g, "\\'")}')" title="Trust Device">Trust</button>`;
                }
                if (!isPreferred && d.paired) {
                    secondaryActions += `<button class="secondary" onclick="btSetPreferred('${d.mac}')" title="Set as Preferred">★</button>`;
                }
                if (d.paired) {
                    secondaryActions += `<button class="bt-danger" onclick="btRemove('${d.mac}')" title="Remove Device">✕</button>`;
                }

                return `
                    <div class="bt-device-item ${d.connected ? 'connected' : ''}">
                        <div class="bt-device-info">
                            <span class="bt-device-name">${d.name || d.alias || 'Unknown'}</span>
                            <span class="bt-device-mac">${d.mac}</span>
                            <div class="bt-device-badges">${badges}</div>
                        </div>
                        <div class="bt-device-actions">
                            <div class="bt-device-actions-primary">${primaryActions}</div>
                            <div class="bt-device-actions-secondary">${secondaryActions}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function btConnect(mac) {
            addLog('BLUETOOTH', `Connecting to ${mac}...`);
            try {
                const res = await fetch(`/v1/bluetooth/devices/${mac}/connect`, { method: 'POST' });
                if (!res.ok) {
                    const err = await res.json();
                    addLog('BT-ERROR', err.detail?.message || 'Connect failed');
                } else {
                    addLog('BLUETOOTH', `Connected to ${mac}`);
                    await btRefreshDevices();
                    await fetchSources(); // BT device may appear as new source
                }
            } catch (err) {
                addLog('BT-ERROR', 'Connect failed: ' + err.message);
            }
        }

        async function btDisconnect(mac) {
            addLog('BLUETOOTH', `Disconnecting ${mac}...`);
            try {
                await fetch(`/v1/bluetooth/devices/${mac}/disconnect`, { method: 'POST' });
                addLog('BLUETOOTH', `Disconnected ${mac}`);
                await btRefreshDevices();
            } catch (err) {
                addLog('BT-ERROR', 'Disconnect failed: ' + err.message);
            }
        }

        async function btTrust(mac, name) {
            try {
                await fetch(`/v1/bluetooth/devices/${mac}/trust`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ alias: name || null })
                });
                addLog('BLUETOOTH', `Trusted ${mac}`);
                await btRefreshDevices();
            } catch (err) {
                addLog('BT-ERROR', 'Trust failed: ' + err.message);
            }
        }

        async function btRemove(mac) {
            if (!confirm(`Remove and unpair device ${mac}?`)) return;
            try {
                await fetch(`/v1/bluetooth/devices/${mac}`, { method: 'DELETE' });
                addLog('BLUETOOTH', `Removed ${mac}`);
                await btRefreshDevices();
            } catch (err) {
                addLog('BT-ERROR', 'Remove failed: ' + err.message);
            }
        }

        async function btSetPreferred(mac) {
            try {
                await fetch('/v1/bluetooth/devices/preferred', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mac })
                });

                // Sync with global preferred source
                const virtualSourceId = `linux-bluetooth-adapter:bluetooth:${mac.toLowerCase()}`;
                await fetch('/v1/config/preferred_source_id', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ value: virtualSourceId })
                });

                addLog('BLUETOOTH', `Set preferred device: ${mac}`);
                await btRefreshDevices();
                await fetchSources(); // Refresh main source list to show preferred badge
            } catch (err) {
                addLog('BT-ERROR', 'Set preferred failed: ' + err.message);
            }
        }

        // ── SSE Event Stream ───────────────────────────────

        function setupSSE() {
            const evtSource = new EventSource("/events");

            evtSource.addEventListener('message', (event) => {
                // Generic message if any
            });

            // Session + topology events
            const sessionEventTypes = [
                'session.created', 'session.starting', 'session.started',
                'session.stopped', 'session.failed', 'topology.changed',
                'publisher.active', 'source.started', 'renderer.discovery.changed'
            ];

            sessionEventTypes.forEach(type => {
                evtSource.addEventListener(type, (event) => {
                    const data = JSON.parse(event.data);
                    addLog(type.toUpperCase(), data);

                    if (data.session_id === currentSessionId || !currentSessionId) {
                        if (type === 'session.started') {
                            updateSessionUI('ACTIVE', 'Playing');
                            playBtn.disabled = true;
                            stopBtn.disabled = false;
                            currentSessionId = data.session_id;
                        }
                        if (type === 'session.stopped') {
                            updateSessionUI('IDLE', 'Idle');
                            currentSessionId = null;
                            playBtn.disabled = false;
                            stopBtn.disabled = true;
                        }
                        if (type === 'session.failed') {
                            const errorAction = data.last_error?.action || 'An unknown error occurred. Please check your connections.';
                            updateSessionUI('ERROR', 'Failed', errorAction);
                            playBtn.disabled = false;
                            stopBtn.disabled = true;
                        }
                    }

                    if (type === 'topology.changed') {
                        fetchSources();
                        fetchTargets();
                    }
                    if (type === 'renderer.discovery.changed') {
                        fetchTargets();
                    }
                });
            });

            // Bluetooth events
            const btEventTypes = [
                'bluetooth.adapter.ready', 'bluetooth.adapter.failed',
                'bluetooth.pairing_window.opened', 'bluetooth.pairing_window.closed',
                'bluetooth.device.discovered', 'bluetooth.device.paired',
                'bluetooth.device.pairing_rejected', 'bluetooth.device.trusted',
                'bluetooth.device.untrusted', 'bluetooth.device.connected',
                'bluetooth.device.disconnected', 'bluetooth.adapter.status.changed',
                'bluetooth.source.available', 'bluetooth.source.unavailable',
                'bluetooth.backend.error'
            ];

            btEventTypes.forEach(type => {
                evtSource.addEventListener(type, (event) => {
                    const data = JSON.parse(event.data);
                    addLog(type.toUpperCase().replace('BLUETOOTH.', 'BT.'), data);

                    // Refresh BT UI on relevant events
                    if (type === 'bluetooth.adapter.status.changed' ||
                        type === 'bluetooth.adapter.ready' ||
                        type === 'bluetooth.adapter.failed') {
                        btFetchStatus();
                    }

                    if (type === 'bluetooth.device.paired' ||
                        type === 'bluetooth.device.connected' ||
                        type === 'bluetooth.device.disconnected' ||
                        type === 'bluetooth.device.trusted' ||
                        type === 'bluetooth.device.untrusted' ||
                        type === 'bluetooth.device.discovered') {
                        btRefreshDevices();
                        if (type === 'bluetooth.device.connected' ||
                            type === 'bluetooth.device.disconnected' ||
                            type === 'bluetooth.device.untrusted') {
                            refreshSources();
                        }
                    }

                    if (type === 'bluetooth.pairing_window.opened') {
                        btFetchStatus();
                    }

                    if (type === 'bluetooth.pairing_window.closed') {
                        btStopCountdown();
                        btFetchStatus();
                        btRefreshDevices();
                        refreshSources();
                    }

                    if (type === 'bluetooth.source.available') {
                        fetchSources();
                    }
                });
            });

            evtSource.onerror = (err) => {
                console.error("SSE connection failed", err);
            };
        }

        // ── Health functions ───────────────────────────────

        async function fetchHealth() {
            try {
                const res = await fetch('/health');
                if (!res.ok) throw new Error('Health check failed');
                const health = await res.json();
                const healthEl = document.getElementById('bridge-health');

                if (health.status === 'ok' && health.ffmpeg && health.ffmpeg.available) {
                    healthEl.textContent = 'Bridge Healthy';
                    healthEl.className = 'status-tag status-active';
                } else {
                    let msg = 'Action Required';
                    if (health.ffmpeg && !health.ffmpeg.available) {
                        msg = 'FFmpeg Missing';
                    }
                    healthEl.textContent = msg;
                    healthEl.className = 'status-tag status-error';
                }
            } catch (err) {
                const healthEl = document.getElementById('bridge-health');
                healthEl.textContent = 'Bridge Offline';
                healthEl.className = 'status-tag status-error';
            }
        }

        // ── Initialize ─────────────────────────────────────

        fetchHealth();
        setInterval(fetchHealth, 30000);

        loadDeliveryProfile();
        fetchSources();
        fetchTargets();
        btFetchStatus();
        btRefreshDevices();
        setupSSE();

        // Initial background refresh once startup settles
        setTimeout(() => {
            refreshSources();
            refreshTargets();
        }, 2000);

        playBtn.onclick = createAndStartSession;
        stopBtn.onclick = stopCurrentSession;
        sourceSelect.onchange = () => {
            syncDeliveryProfileSelection();
            updateSessionUI(sessionState.textContent.toUpperCase() === 'IDLE' ? 'IDLE' : (sessionState.textContent.toUpperCase() === 'FAILED' ? 'ERROR' : 'ACTIVE'), sessionState.textContent);
        };
        targetSelect.onchange = () => {
            updateSessionUI(sessionState.textContent.toUpperCase() === 'IDLE' ? 'IDLE' : (sessionState.textContent.toUpperCase() === 'FAILED' ? 'ERROR' : 'ACTIVE'), sessionState.textContent);
        };
        deliveryProfileSelect.onchange = () => {
            persistDeliveryProfile().catch(err => {
                console.error('Failed to persist delivery profile', err);
                addLog('ERROR', 'Failed to save delivery profile');
            });
        };
        refreshSourcesBtn.onclick = refreshSources;
        refreshTargetsBtn.onclick = refreshTargets;
        document.getElementById('set-preferred-source').onclick = setPreferredSource;
        document.getElementById('set-preferred-target').onclick = setPreferredTarget;

        // Check for existing active sessions on load
        async function checkActiveSessions() {
            try {
                const res = await fetch('/v1/sessions');
                const { sessions } = await res.json();
                const active = sessions.find(s => ['playing', 'starting', 'preparing'].includes(s.state) || s.state === 'failed');
                if (active) {
                    currentSessionId = active.session_id;
                    const errorAction = active.last_error?.action || null;
                    const stateType = active.state === 'failed' ? 'ERROR' : 'ACTIVE';
                    updateSessionUI(stateType, active.state.charAt(0).toUpperCase() + active.state.slice(1), errorAction);

                    if (active.state === 'failed') {
                        playBtn.disabled = false;
                        stopBtn.disabled = true;
                    } else {
                        playBtn.disabled = true;
                        stopBtn.disabled = false;
                    }
                }
            } catch (e) {}
        }
        checkActiveSessions();

        // Poll BT status every 10s for adapter state changes
        setInterval(btFetchStatus, 10000);
    </script>
</body>
