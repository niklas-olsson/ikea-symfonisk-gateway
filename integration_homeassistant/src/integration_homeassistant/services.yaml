recover_session:
  description: "Attempts to recover a failed or degraded session on the bridge."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway
    session_id:
      description: "The ID of the session to recover (optional, will attempt to recover the active session if not provided)."
      required: false
      selector:
        text:

refresh_discovery:
  description: "Triggers a full discovery refresh of both audio sources and playback targets on the bridge."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway

refresh_sources:
  description: "Triggers a manual refresh of available audio sources on the bridge."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway

refresh_targets:
  description: "Triggers a manual refresh of available playback targets (speakers) on the bridge."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway

start_playback:
  description: "Starts playback on the bridge using current or explicit selections."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway
    source_id:
      description: "Optional explicit source ID to use for playback."
      required: false
      selector:
        text:
    target_id:
      description: "Optional explicit target ID (speaker) to use for playback."
      required: false
      selector:
        text:

stop_playback:
  description: "Stops all active playback sessions on the bridge."
  fields:
    entry_id:
      description: "The config entry ID of the bridge (optional if only one bridge is configured)."
      required: false
      selector:
        config_entry:
          integration: ikea_symfonisk_gateway
