name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  gitignore-review:
    runs-on: ubuntu-latest
    outputs:
      requires_review: ${{ steps.check.outputs.modified == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if .gitignore was modified
        id: check
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q "^.gitignore$"; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Flag for review if .gitignore changed
        if: steps.check.outputs.modified == 'true'
        run: |
          echo "::notice::.gitignore was modified. This PR requires thorough review to ensure no intentional exclusions were removed."
          echo "Review checklist:"
          echo "  1. Are any __pycache__ entries present?"
          echo "  2. Are any .pyc/.pyo entries present?"
          echo "  3. Are any test/coverage directories excluded?"
          echo "  4. Are any secrets/config files properly excluded?"

  test:
    runs-on: ubuntu-latest
    needs: gitignore-review
    if: always() && needs.gitignore-review.result != 'failure'
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --dev
        # Note: ffmpeg is required at runtime but mocked in tests, so not installed in CI

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy . --no-error-summary || true

      - name: Test
        run: uv run pytest .

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build packages
        run: |
          uv sync
          for pkg in bridge_core ingress_sdk adapters/synthetic adapters/linux_audio adapters/linux_bluetooth renderer_sonos ui_web integration_homeassistant shared; do
            uv build $pkg || true
          done
