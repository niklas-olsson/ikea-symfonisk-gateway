name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-packages --dev

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy . --no-error-summary || true

      - name: Test
        run: uv run pytest .

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build packages
        run: |
          uv sync
          for pkg in bridge_core ingress_sdk adapters/synthetic adapters/linux_audio adapters/linux_bluetooth renderer_sonos ui_web integration_homeassistant shared; do
            uv build $pkg || true
          done
